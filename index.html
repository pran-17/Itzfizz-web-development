<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ItzFizz Dashboard</title>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- DASHBOARD TITLE -->
  <header class="dashboard">
    <h1 class="title">
      <span>W</span><span>E</span><span>L</span><span>C</span><span>O</span><span>M</span><span>E</span>
      <span>&nbsp;</span><span>T</span><span>O</span>
      <span>&nbsp;</span><span>I</span><span>T</span><span>Z</span><span>F</span><span>I</span><span>Z</span><span>Z</span>
    </h1>
    <p class="hint">Press SPACE to continue</p>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <img src="assests/car.jpg" class="car" alt="Car">

    <div class="text t1">95% User Satisfaction</div>
    <div class="text t2">120% Performance</div>
    <div class="text t3">80% Energy Efficient</div>

  <div class="progress">
  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>
  </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
